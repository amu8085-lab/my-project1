name: Auto Render Hindi Facts Video

on:
  repository_dispatch:
    types: [render_and_upload]
  workflow_dispatch:

jobs:
  build_video:
    runs-on: ubuntu-latest
    
    # Increased timeout to allow for full video rendering and API uploads
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # Removed cache: 'pip' from here so it doesn't look for requirements.txt

      - name: Install System Dependencies (FFmpeg & ImageMagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 requests edge-tts urllib3 Pillow==9.5.0

      - name: Run Video Rendering Script
        env:
          PYTHONUNBUFFERED: "1"
          FULL_TEXT: ${{ github.event.client_payload.full_text }}
          SCENES_DATA: ${{ github.event.client_payload.scenes_data }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          THUMBNAIL_PROMPT: ${{ github.event.client_payload.thumbnail_prompt }}
          RESUME_URL: ${{ github.event.client_payload.resume_url }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }} 
        run: python render_video.py
